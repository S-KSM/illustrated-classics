<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Signing you in…</title>
<style>
    body { margin: 0; font-family: 'Inter', -apple-system, sans-serif; background: #fdf8ef; color: #1a1a1a; display: grid; place-items: center; height: 100vh; text-align: center; padding: 24px; }
    .callback-title { font-family: 'Fraunces', Georgia, serif; font-weight: 900; font-style: italic; font-size: 1.6rem; letter-spacing: -0.02em; margin-bottom: 8px; }
    .callback-sub { color: #5a564e; font-size: 0.95rem; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,900&display=swap" rel="stylesheet">
</head>
<body>
<div>
    <h1 class="callback-title">Signing you in…</h1>
    <p class="callback-sub">One moment while we verify your email.</p>
</div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb = createClient('https://pwaprvmsmcvwzxqhjhpm.supabase.co', 'sb_publishable_LwE5Ct1OZX-Stvw-K8Y7LA_gFVdnroG', {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
});
const base = location.pathname.startsWith('/classics/') ? '/classics/' : '/';
function go() { location.href = base; }

(async () => {
    // If this is a PKCE code flow, exchange explicitly.
    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    if (code) {
        try { await sb.auth.exchangeCodeForSession(code); } catch (e) {}
    }
    // Wait for either a session or a SIGNED_IN event (handles implicit hash flow too).
    const { data: { session } } = await sb.auth.getSession();
    if (session) return go();
    const t = setTimeout(go, 5000);
    sb.auth.onAuthStateChange((event) => {
        if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
            clearTimeout(t); go();
        }
    });
})();
</script>
</body>
</html>
